{{ $id := .Get "id" | default "join" }}

<section class="py-[clamp(56px,9vw,98px)]" id="{{ $id }}">
  <div class="max-w-(--maxw) mx-auto px-[clamp(20px,4vw,56px)]">

    <div class="border border-signal/30 p-[clamp(30px,5vw,56px)] relative bg-linear-to-br from-surface to-bg">
      <span class="absolute top-3 right-4 font-mono text-[0.7rem] text-signal tracking-widest">● TX</span>

      {{ with .Get "title" }}
      <h2 class="text-[clamp(1.8rem,4vw,2.9rem)] font-bold tracking-tight mb-4 max-w-[18ch]">{{ . }}</h2>
      {{ end }}

      {{ with .Inner }}
      <p class="text-muted max-w-[52ch] mb-7">{{ . | markdownify | plainify }}</p>
      {{ end }}

      <div class="flex border border-border w-fit">
        {{ with .Get "primary" }}
        <a href="{{ $.Get " primary_url" | default "#" }}"
          class="font-mono text-sm px-6 py-3 bg-signal text-on-signal font-semibold hover:bg-text transition-colors">
          {{ . }}
        </a>
        {{ end }}
        {{ with .Get "secondary" }}
        <a href="{{ $.Get " secondary_url" | default "#" }}"
          class="font-mono text-sm px-6 py-3 text-text hover:bg-surface hover:text-signal border-l border-border transition-colors">
          {{ . }}
        </a>
        {{ end }}
      </div>

    </div>
  </div>
</section>
