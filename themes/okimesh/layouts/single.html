{{ define "main" }}
<article class="page">
  <div class="wrap">
    <div class="page-head">
      {{ with .Params.eyebrow }}<p class="eyebrow">{{ . }}</p>{{ end }}
      <h1>{{ .Title }}</h1>
      {{ if not .Date.IsZero }}<p class="meta">{{ .Date.Format "Jan 2, 2006" }}{{ with .Params.author }} · {{ . }}{{ end }}</p>{{ end }}
    </div>
    <div class="prose">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
