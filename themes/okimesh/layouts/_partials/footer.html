<footer>
  <div class="wrap">
    <div class="foot-top">
      <a class="brand" href="{{ "/" | relURL }}"><span class="dot"></span> {{ site.Title }}</a>
      <nav class="foot-links">
        {{ range site.Params.social }}
          <a href="{{ .url }}"{{ if hasPrefix .url "http" }} rel="noopener" target="_blank"{{ end }}>{{ .name }}</a>
        {{ end }}
        {{ range site.Menus.footer }}
          <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
    <div class="foot-bottom">
      <span>© {{ now.Year }} {{ site.Title }}{{ with site.Params.region }} — {{ . }}{{ end }}</span>
      <span>{{ site.Params.footerTagline | default "Built for resilient communications." }}</span>
    </div>
  </div>
</footer>
